<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #ffafbd;
            --secondary: #ffc3a0;
            --text-color: #4a4a4a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to right, #ffafbd, #ffc3a0);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
            position: relative;
            border: 2px solid #fff;
        }

        .heart-icon {
            color: #ff6b81;
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
            animation: heartbeat 1.5s infinite;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #ff6b81;
            margin: 10px 0;
        }

        h2 {
            font-weight: 300;
            color: var(--text-color);
            font-size: 1.5rem;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 2s forwards 1s;
        }

        .message {
            color: #777;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 2s forwards 2s;
        }

        .btn {
            background: #ff6b81;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 129, 0.5);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Floating sparkles */
        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.5;
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-100px) translateX(20px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="heart-icon">🌸</span>
        <h1 id="greeting">Assalam-o-Alaikum!</h1>
        <h2 id="name-display">Friend</h2>
        <p class="message">I was just thinking about you and wanted to check in... <strong>How are you doing today?</strong> Hope you're having a day as wonderful as you are!</p>
        <button class="btn" onclick="popConfetti()">Click for a Smile</button>
    </div>

    <script>
        // Magic Link Logic
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name');
            if(name) {
                document.getElementById('name-display').innerText = name;
            }
            
            // Create random background sparkles
            for(let i=0; i<15; i++) {
                let sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + 'vw';
                sparkle.style.top = Math.random() * 100 + 'vh';
                sparkle.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(sparkle);
            }
        };

        function popConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ffafbd', '#ffc3a0', '#ffffff', '#ff6b81']
            });
        }
    </script>
</body>
</html>
